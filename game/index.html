<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jasurbek // HackOS Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--dock:#1a1f2e;--panel:#131920;--win:#161d27;
  --bar:#1e2535;--border:#2a3a4a;--border2:#1e2d3d;
  --g:#7ee787;--g2:#3fb950;--g3:#56d364;
  --c:#58a6ff;--c2:#79c0ff;--pur:#bc8cff;
  --r:#ff7b72;--y:#e3b341;--pk:#f778ba;
  --muted:#484f58;--muted2:#6e7681;--text:#c9d1d9;--text2:#8b949e;
  --font:'JetBrains Mono',monospace;
  --radius:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);display:flex;flex-direction:column;user-select:none;}

/* ══ DESKTOP WALLPAPER ══ */
#wallpaper{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(188,140,255,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(88,166,255,.07) 0%, transparent 55%),
    radial-gradient(ellipse at 60% 80%, rgba(126,231,135,.05) 0%, transparent 50%),
    linear-gradient(135deg,#0d1117 0%,#0a0f1a 50%,#070d14 100%);
}
#wallpaper canvas{position:absolute;inset:0;opacity:.12}

/* ══ MENU BAR (macOS style) ══ */
#menubar{
  position:relative;z-index:100;
  height:28px;
  background:rgba(22,29,39,.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;padding:0 1rem;gap:1.5rem;
  flex-shrink:0;
}
.mb-apple{font-size:.9rem;color:var(--text2)}
.mb-item{font-size:.68rem;color:var(--text2);cursor:pointer;padding:.2rem .4rem;border-radius:4px;white-space:nowrap}
.mb-item:hover{background:rgba(255,255,255,.08);color:var(--text)}
.mb-right{margin-left:auto;display:flex;gap:.8rem;align-items:center}
.mb-status{font-size:.6rem;color:var(--muted2);display:flex;align-items:center;gap:.3rem}
.mb-status .dot-pulse{width:6px;height:6px;border-radius:50%;background:var(--g2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(63,185,80,.4)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(63,185,80,0)}}
#mb-clock{font-size:.62rem;color:var(--text2)}

/* ══ DESKTOP AREA ══ */
#desktop{
  position:relative;z-index:10;flex:1;overflow:hidden;
  display:flex;flex-direction:column;
}

/* ══ WINDOW CHROME ══ */
#terminal-window{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(960px,96vw);
  height:min(640px,calc(100vh - 80px));
  background:rgba(13,17,23,.95);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:all .3s ease;
}
#terminal-window.maximized{
  top:0;left:0;transform:none;
  width:100%;height:100%;
  border-radius:0;
}

/* ── Title Bar ── */
#titlebar{
  height:38px;flex-shrink:0;
  background:rgba(22,29,39,.98);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;
  padding:0 1rem;gap:.8rem;
  position:relative;
}
.tb-dots{display:flex;gap:.45rem}
.tb-dot{
  width:12px;height:12px;border-radius:50%;cursor:pointer;
  transition:filter .15s;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:.4rem;color:transparent;
}
.tb-dot:hover{filter:brightness(1.2);color:rgba(0,0,0,.6)}
.tb-dot.close{background:#ff5f57}
.tb-dot.min{background:#febc2e}
.tb-dot.max{background:#28c840}
.tb-title{
  position:absolute;left:50%;transform:translateX(-50%);
  font-size:.68rem;color:var(--muted2);letter-spacing:.05em;
  white-space:nowrap;
}
.tb-right-btns{margin-left:auto;display:flex;gap:.5rem}
.tb-icon-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:.15rem .5rem;color:var(--muted2);font-size:.6rem;cursor:pointer;transition:all .15s}
.tb-icon-btn:hover{border-color:var(--g2);color:var(--g)}

/* ── Main Layout ── */
#main-layout{flex:1;display:flex;overflow:hidden}

/* ── Sidebar ── */
#sidebar{
  width:200px;flex-shrink:0;
  background:rgba(10,14,20,.9);
  border-right:1px solid var(--border2);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:all .3s;
}
#sidebar.hidden{width:0;overflow:hidden}
.sb-section{padding:.7rem .8rem;border-bottom:1px solid var(--border2)}
.sb-head{
  font-size:.55rem;letter-spacing:.18em;color:var(--muted);
  text-transform:uppercase;margin-bottom:.5rem;
  display:flex;align-items:center;gap:.4rem;
}
.sb-head::before{content:'';flex:1;height:1px;background:var(--border2)}

/* Mission list */
.mis-item{
  display:flex;align-items:center;gap:.5rem;
  padding:.4rem .5rem;border-radius:5px;cursor:pointer;
  margin-bottom:.2rem;transition:background .15s;
}
.mis-item:hover,.mis-item.active{background:rgba(88,166,255,.08)}
.mis-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mis-dot.locked{background:var(--muted)}
.mis-dot.active{background:var(--y);animation:pulse 2s infinite}
.mis-dot.done{background:var(--g2)}
.mis-info{min-width:0}
.mis-name{font-size:.62rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mis-ip{font-size:.55rem;color:var(--muted2)}

/* Tool buttons */
.tool-grid{display:flex;flex-wrap:wrap;gap:.3rem;padding:.6rem .8rem}
.tool-btn{
  font-size:.57rem;padding:.25rem .5rem;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border2);
  border-radius:4px;color:var(--muted2);cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.tool-btn:hover{background:rgba(126,231,135,.08);border-color:var(--g2);color:var(--g)}
.tool-btn.cat-recon{border-color:rgba(88,166,255,.3);color:var(--c)}
.tool-btn.cat-recon:hover{background:rgba(88,166,255,.1);border-color:var(--c)}
.tool-btn.cat-access{border-color:rgba(188,140,255,.3);color:var(--pur)}
.tool-btn.cat-access:hover{background:rgba(188,140,255,.1);border-color:var(--pur)}
.tool-btn.cat-shell{border-color:rgba(126,231,135,.3);color:var(--g)}
.tool-btn.cat-shell:hover{background:rgba(126,231,135,.1)}
.tool-btn.cat-game{border-color:rgba(227,179,65,.3);color:var(--y)}
.tool-btn.cat-game:hover{background:rgba(227,179,65,.1)}

/* Stats */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:.25rem .8rem}
.stat-label{font-size:.58rem;color:var(--muted2)}
.stat-val{font-size:.62rem;font-weight:700;color:var(--g)}

/* ── Terminal Area ── */
#term-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Tab bar */
#tabbar{
  height:32px;flex-shrink:0;
  background:rgba(16,22,30,.98);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:flex-end;padding:0 .8rem;gap:.3rem;
  overflow-x:auto;overflow-y:hidden;
}
#tabbar::-webkit-scrollbar{height:0}
.tab{
  height:26px;padding:0 .8rem;
  display:flex;align-items:center;gap:.4rem;
  border:1px solid transparent;border-bottom:none;
  border-radius:6px 6px 0 0;
  font-size:.62rem;color:var(--muted2);cursor:pointer;
  white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.tab.active{background:rgba(13,17,23,.95);border-color:var(--border2);color:var(--text)}
.tab .tab-dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.tab.active .tab-dot{background:var(--g2);animation:pulse 2s infinite}
.tab-close{font-size:.55rem;opacity:0;transition:opacity .15s;margin-left:.2rem}
.tab:hover .tab-close{opacity:.6}

/* Output */
#output{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:1rem 1.2rem .5rem;
  font-size:.72rem;line-height:1.8;
}
#output::-webkit-scrollbar{width:5px}
#output::-webkit-scrollbar-track{background:transparent}
#output::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Input row */
#input-row{
  display:flex;align-items:center;gap:.5rem;
  padding:.5rem 1.2rem;
  background:rgba(16,22,30,.98);
  border-top:1px solid var(--border2);
  flex-shrink:0;
}
#prompt{color:var(--g);font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0}
#cmd{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--font);font-size:.72rem;
  caret-color:var(--g);min-width:0;
}

/* Mobile keyboard helper */
#mobile-keys{
  display:none;
  flex-wrap:wrap;gap:.3rem;padding:.5rem .8rem;
  background:rgba(10,14,20,.95);border-top:1px solid var(--border2);
  overflow-x:auto;flex-shrink:0;
}
.mk-btn{
  font-family:var(--font);font-size:.6rem;padding:.3rem .65rem;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:4px;color:var(--text2);cursor:pointer;white-space:nowrap;
  transition:all .15s;flex-shrink:0;
}
.mk-btn:active,.mk-btn:hover{background:rgba(126,231,135,.1);border-color:var(--g2);color:var(--g)}

/* ══ DOCK (macOS) ══ */
#dock{
  position:relative;z-index:100;
  display:flex;align-items:center;justify-content:center;
  padding:.4rem .8rem;flex-shrink:0;
  gap:.5rem;
  background:rgba(22,29,39,.6);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.06);
}
.dock-item{
  display:flex;flex-direction:column;align-items:center;gap:.2rem;
  cursor:pointer;padding:.3rem .5rem;border-radius:8px;
  transition:all .2s;
}
.dock-item:hover{background:rgba(255,255,255,.06);transform:translateY(-3px)}
.dock-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
}
.dock-label{font-size:.45rem;color:var(--muted2);letter-spacing:.04em}
.dock-sep{width:1px;height:30px;background:var(--border);margin:0 .2rem}

/* ══ OUTPUT COLORS ══ */
.g{color:var(--g)}.g2{color:var(--g2)}.g3{color:var(--g3)}
.c{color:var(--c)}.c2{color:var(--c2)}.pur{color:var(--pur)}
.r{color:var(--r)}.y{color:var(--y)}.pk{color:var(--pk)}
.m{color:var(--muted2)}.w{color:var(--text)}.b{font-weight:700}
.sep-line{color:var(--border);display:block;overflow:hidden;white-space:nowrap}
.out-line{display:block;word-break:break-word}
.art{color:var(--g);line-height:1.25;font-size:.6rem}
.flag-box{
  display:inline-block;padding:.4rem 1rem;margin:.3rem 0;
  border:1px solid var(--g2);border-radius:5px;
  background:rgba(63,185,80,.08);color:var(--g);font-weight:700;
  letter-spacing:.04em;
}
.pbar-wrap{display:flex;align-items:center;gap:.8rem;margin:.15rem 0}
.pbar-label{font-size:.62rem;color:var(--muted2);width:200px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbar{height:3px;background:var(--border);border-radius:2px;flex:1;min-width:60px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--g2),var(--g));transition:width .04s linear;border-radius:2px}
.win-badge{
  display:inline-block;font-size:.58rem;padding:.1rem .5rem;
  border-radius:3px;font-weight:700;letter-spacing:.05em;
}
.win-badge.high{background:rgba(255,123,114,.15);color:var(--r);border:1px solid rgba(255,123,114,.3)}
.win-badge.med{background:rgba(227,179,65,.15);color:var(--y);border:1px solid rgba(227,179,65,.3)}
.win-badge.crit{background:rgba(247,120,186,.15);color:var(--pk);border:1px solid rgba(247,120,186,.3)}

/* ══ RESPONSIVE ══ */
@media(max-width:700px){
  #menubar .mb-item:not(.mb-brand){display:none}
  #terminal-window{
    width:100%;height:calc(100vh - 90px);
    top:0;left:0;transform:none;border-radius:0;
    position:relative;
  }
  #sidebar{display:none}
  #tabbar .tab:not(.active){display:none}
  #mobile-keys{display:flex}
  #dock .dock-label{display:none}
  .dock-icon{width:28px;height:28px;font-size:.85rem}
  #dock{padding:.3rem .5rem;gap:.3rem}
  #output{font-size:.68rem;padding:.7rem .8rem .4rem}
  .tb-title{font-size:.58rem}
  #titlebar{padding:0 .7rem}
  #input-row{padding:.4rem .8rem}
  #cmd{font-size:.68rem}
  #prompt{font-size:.68rem}
  .art{font-size:.42rem}
}
@media(max-width:400px){
  .art{font-size:.35rem}
  #output{font-size:.62rem}
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════
// BG PARTICLES
// ═══════════════════════════════════════════════════
(function(){
  const c=document.getElementById('bg-canvas');
  const x=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const pts=Array.from({length:60},()=>({
    x:Math.random()*c.width,y:Math.random()*c.height,
    vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
    r:Math.random()*1.5+.5,
  }));
  function draw(){
    x.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
      x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);
      x.fillStyle='rgba(126,231,135,0.4)';x.fill();
    });
    // lines
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          x.beginPath();x.moveTo(pts[i].x,pts[i].y);x.lineTo(pts[j].x,pts[j].y);
          x.strokeStyle=`rgba(88,166,255,${.15*(1-d/120)})`;x.lineWidth=.5;x.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════
function updateClock(){
  const n=new Date();
  document.getElementById('mb-clock').textContent=
    n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
updateClock();setInterval(updateClock,10000);

// ═══════════════════════════════════════════════════
// MISSIONS
// ═══════════════════════════════════════════════════
const MISSIONS=[
  {

const out=document.getElementById('output');
const cmdIn=document.getElementById('cmd');

function line(html=''){
  const d=document.createElement('div');
  d.className='out-line';
  d.innerHTML=html||'&nbsp;';
  out.appendChild(d);
  out.scrollTop=out.scrollHeight;
}
function blank(){line('')}
function sep(n=50,ch='─'){line(`<span class="sep-line">${ch.repeat(n)}</span>`)}

async function progress(label,ms=1200){
  return new Promise(res=>{
    const wrap=document.createElement('div');
    wrap.className='pbar-wrap';
    const lb=document.createElement('div');lb.className='pbar-label';lb.textContent=label;
    const pb=document.createElement('div');pb.className='pbar';
    const fill=document.createElement('div');fill.className='pbar-fill';fill.style.width='0%';
    pb.appendChild(fill);wrap.appendChild(lb);wrap.appendChild(pb);
    out.appendChild(wrap);out.scrollTop=out.scrollHeight;
    let w=0;
    const iv=setInterval(()=>{
      w+=2;fill.style.width=w+'%';
      out.scrollTop=out.scrollHeight;
      if(w>=100){clearInterval(iv);res();}
    },ms/50);
  });
}

function updateHUD(){
  const m=getMission();
  document.getElementById('sb-score').textContent=S.score;
  document.getElementById('sb-flags').textContent=S.flags+'/'+MISSIONS.length;
  document.getElementById('mb-score').textContent=S.score+' pts';
  document.getElementById('mb-mis').textContent=m.name;
  let lv='';
  for(let i=0;i<3;i++) lv+=S.lives>i?'<span style="color:var(--r)">♥</span>':'<span style="color:var(--muted)">♡</span>';
  document.getElementById('sb-lives').innerHTML=lv;
  // mission list
  const ml=document.getElementById('mis-list');
  ml.innerHTML='';
  MISSIONS.forEach((m2,i)=>{
    const st=i<S.missionIdx?'done':i===S.missionIdx?'active':'locked';
    const el=document.createElement('div');
    el.className='mis-item'+(i===S.missionIdx?' active':'');
    el.innerHTML=`<div class="mis-dot ${st}"></div><div class="mis-info"><div class="mis-name">${m2.name}</div><div class="mis-ip">${m2.ip}</div></div>`;
    ml.appendChild(el);
  });
}
function updatePrompt(){
  const m=getMission();
  const isWin=m.os.toLowerCase().includes('windows');
  const isMac=m.os.toLowerCase().includes('macos');
  const shell=isMac?'zsh':isWin?'PS':'bash';
  const user=isMac?'admin':isWin?'Administrator':'root';
  const host=m.hostname;
  const cwd=S.cwd==='/'?'~':S.cwd.split('/').pop()||'/';
  const sym=isWin?'>':'#';
  const color=isMac?'#58a6ff':isWin?'#bc8cff':'#7ee787';
  document.getElementById('prompt').style.color=color;
  document.getElementById('prompt').textContent=`${user}@${host}:${cwd}${sym}`;
  document.getElementById('tb-title').textContent=`${user}@${host} — ${m.os}`;
}

function normPath(p){
  if(!p||p==='~') return '/home/'+(getMission().users[1]||'user');
  if(p==='/') return '/';
  if(p==='..'){
    const parts=S.cwd.split('/').filter(Boolean);
    parts.pop();
    return '/'+parts.join('/');
  }
  if(p.startsWith('/')) return p;
  return (S.cwd==='/'?'':S.cwd)+'/'+p;
}
function fsGet(p){return getMission().fs[p]}

// ═══════════════════════════════════════════════════
// DISPATCHER
// ═══════════════════════════════════════════════════
const ALL_CMDS=Object.keys(CMD);
function autocomplete(){
  const v=cmdIn.value.trim().split(' ');
  const partial=v[v.length-1];
  if(v.length===1){
    const m=ALL_CMDS.filter(c=>c.startsWith(partial));
    if(m.length===1){cmdIn.value=m[0]+' ';}
    else if(m.length>1){blank();line(m.map(c=>`<span class="g">${c}</span>`).join('  '));blank();}
  }
}
function histNav(dir){
  if(!S.history.length) return;
  S.histIdx=S.histIdx<0?S.history.length-1:Math.max(0,Math.min(S.history.length-1,S.histIdx+dir));
  cmdIn.value=S.history[S.histIdx]||'';
}
async function dispatch(raw){
  if(!raw.trim()) return;
  const parts=raw.trim().split(/\s+/);
  const cmd=parts[0].toLowerCase();
  const args=parts.slice(1);
  line(`<span class="g b">${document.getElementById('prompt').textContent}</span> <span class="w">${raw}</span>`);
  S.history.push(raw);S.histIdx=-1;
  const handler=CMD[cmd]||CMD[cmd.replace('-','')];
  if(handler) await handler(args);
  else{
    line(`<span class="r">bash: ${cmd}: command not found</span>`);
    const similar=ALL_CMDS.filter(c=>c.startsWith(cmd[0]));
    if(similar.length) line(`<span class="m">O'xshash: ${similar.join(', ')}</span>`);
    blank();
  }
}

cmdIn.addEventListener('keydown',async e=>{
  if(e.key==='Enter'){const v=cmdIn.value;cmdIn.value='';await dispatch(v);}
  if(e.key==='ArrowUp'){e.preventDefault();histNav(-1);}
  if(e.key==='ArrowDown'){e.preventDefault();histNav(1);}
  if(e.key==='Tab'){e.preventDefault();autocomplete();}
});
document.addEventListener('click',()=>cmdIn.focus());
